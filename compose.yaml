services:
  convertx:
    container_name: convertx
    build:
      context: .
      dockerfile: Dockerfile
    image: convertx-local:latest
    restart: unless-stopped
    ports:
      - "${CONVERTX_PORT:-3000}:3000"
    environment:
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env}"
      HTTP_ALLOWED: "${HTTP_ALLOWED:-true}"
      ACCOUNT_REGISTRATION: "${ACCOUNT_REGISTRATION:-false}"
      ALLOW_UNAUTHENTICATED: "${ALLOW_UNAUTHENTICATED:-false}"
      AUTO_DELETE_EVERY_N_HOURS: "${AUTO_DELETE_EVERY_N_HOURS:-1}"
      TZ: "${TZ:-Asia/Shanghai}"
      WEBROOT: "${WEBROOT:-}"
      HIDE_HISTORY: "${HIDE_HISTORY:-false}"
      UNAUTHENTICATED_USER_SHARING: "${UNAUTHENTICATED_USER_SHARING:-false}"
      QTWEBENGINE_CHROMIUM_FLAGS: "--no-sandbox"
    volumes:
      - ./data:/app/data
